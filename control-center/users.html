<!-- This page is for user management. It fetches all users and allows filtering. It should be accessible to the admins only -->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>User Management</title>
        <link rel="stylesheet" href="../styles/index.css" />
        <link rel="stylesheet" href="./styles/users.css" />
    </head>
    <body>
        <nav>
            <h1 id="app-name">SA - Learnerships</h1>
            <ul>
                <li id="notifications">
                    <img src="/assets/notifications.png" />
                    <p id="count">2</p>
                </li>
                <li id="profile-details">
                    <section>
                        <h4>Dikeledi Moatle</h4>
                        <p>Applicant</p>
                    </section>
                    <h3>D</h3>
                </li>
            </ul>
        </nav>
        <main>
            <aside>
                <button id="apply-btn" class="coloured-btn">Apply</button>
                <ul id="sidebar-options">
                    <li>
                        <section id="opportunities-nav" class="heading">
                            <p>Opportunities</p>
                            <img id="opportunities-nav-image" src="/assets/right-arrow.png" />
                        </section>
                        <section id="opportunities-nav-options"></section>
                    </li>
                    <li>
                        <section class="heading">
                            <p>Your Account</p>
                            <img src="/assets/right-arrow.png" />
                        </section>
                    </li>
                    <li>
                        <section class="heading">
                            <p>Settings</p>
                            <img src="/assets/right-arrow.png" />
                        </section>
                    </li>
                </ul>
            </aside>
            <section id="main-details">
                <section id="page-container">
                    <h1 id="page-title">User Management</h1>
                    <form onsubmit="return false;">
                        <input id="searchInput" type="text" placeholder="Search users..." />
                        <select id="roleFilter">
                            <option value="all">All Roles</option>
                            <option value="applicant">Applicant</option>
                            <option value="provider">Provider</option>
                            <option value="admin">Admin</option>
                        </select>
                    </form>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                    <section id="table-state"></section>
                    <section id="table-error"></section>
                </section>
            </section>
        </main>
        <script src="../scripts/index.js"></script>
        <script src="./scripts/users.js"></script>
    </body>
</html>

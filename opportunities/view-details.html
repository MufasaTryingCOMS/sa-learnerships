<!-- This page is for viewing an opportunity so it needs the id to function accordingly  -->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title id="page-title">View Opportunity Details</title>
        <link rel="stylesheet" href="../styles/index.css" />
        <link rel="stylesheet" href="./styles/view.css" />
    </head>
    <body>
        <section id="page-state"></section>
        <section id="details-container">
            <header>
                <h2 id="title"></h2>
                <p id="status" class="pending"></p>
            </header>
            <h3>Description:</h3>
            <p id="description"></p>
            <h3>Requirements:</h3>
            <ul id="requirements"></ul>
            <section id="details-wrapper">
                <section>
                    <h3>Stipend:</h3>
                    <p id="stipend"></p>
                </section>
                <section>
                    <h3>Duration:</h3>
                    <p id="duration"></p>
                </section>
            </section>
            <section id="details-wrapper">
                <section>
                    <h3>Location:</h3>
                    <p id="location"></p>
                </section>
                <section>
                    <h3>Closing Date:</h3>
                    <p id="closing-date"></p>
                </section>
            </section>
            <!-- Actions that should only be visible to the admin -->
            <hr />
            <section id="actions">
                <button id="approve-btn">Approve</button>
                <button id="reject-btn">Reject</button>
                <button id="back-btn">Back</button>
            </section>
        </section>
        <script src="./scripts/view-details.js"></script>
    </body>
</html>

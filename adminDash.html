<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- title of the page since it hosts all admin controls -->
    <title>Admin Control Center</title>
     <!-- since we havent decided on a design i just put my styles here guys -->
    <style>
      /* basic page setup */
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }

      /* this are the colours i used for the sligth gradient blue */
      :root {
        --primary-gradient: linear-gradient(
          135deg,
          #020811,
          #0c1d46,
          #111c33,
          #223157,
          #26304b
        );
       /* i used this to overlay the sidebar options when i hover over them */
        --hover: rgba(255, 255, 255, 0.08);
      }

      /* header */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 26px;
        background: var(--primary-gradient);
        color: white;
      }

      header h1 {
        margin: 0;
        font-size: 20px;
      }

      header section {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
      }

      .logout {
        cursor: pointer;
        text-decoration: underline;
      }

      /* layout */
      main {
        display: flex;
        height: calc(100vh - 70px);
      }

      /* sidebar */
      nav {
        width: 260px;
        background: var(--primary-gradient);
        display: flex;
        flex-direction: column;
        padding-top: 10px;
      }

      nav h2 {
        margin: 0;
        padding: 12px 16px;
        font-size: 12px;
        text-transform: uppercase;
        color: #e2e8f0;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
      }

      nav h2:hover,
      nav a:hover {
        background: var(--hover);
      }

      /*dropdown menu...used it for roles and filtering search*/
      nav section {
        display: flex;
        flex-direction: column;
        margin-left: 10px;
        border-left: 2px solid rgba(255, 255, 255, 0.2);
      }

      nav a {
        color: white;
        text-decoration: none;
        padding: 10px 24px;
        font-size: 13px;
      }

      main > section {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
      }

      form {
        display: flex;
        gap: 12px;
        margin: 20px 0;
      }

      input,
      select {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
      }

      input {
        flex: 2;
      }

      select {
        flex: 1;
      }

      /* table css stuff*/
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 8px;
      }

      th,
      td {
        padding: 14px;
        border-bottom: 1px solid #eee;
      }

      th {
        background: #f8fafc;
        text-align: left;
        font-size: 13px;
      }

      tr:hover {
        background: #f9fafb;
        cursor: pointer;
      }

      .empty {
        text-align: center;
        padding: 20px;
        color: #94a3b8;
      }

      /*this i not working properly but i will fix it later...doesnt harm the code tho*/
      .welcomeCell {
        text-align: center;
        padding: 50px;
        font-size: 20px;
        font-weight: bold;
        color: #94a3b8;
        letter-spacing: 2px;
      }
/* user detail card...it contains user info  */
      section article {
        background: white;
        padding: 25px;
        border-radius: 10px;
        max-width: 480px;
        border: 1px solid #e2e8f0;
      }

      section article p {
        margin: 16px 0;
      }

      section article strong {
        display: block;
        font-size: 11px;
        color: #64748b;
        margin-bottom: 4px;
        text-transform: uppercase;
      }

      #detailRole {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
      }

      section footer {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }

      button {
        padding: 9px 14px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background: white;
        cursor: pointer;
        font-size: 13px;
      }

      button:hover {
        background: #f1f5f9;
      }

      .save {
        border: 1px solid #0f172a;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <!--header showing that this is the admin control center-->
    <header>
      <h1>Admin Control Center</h1>

      <section>
        <span>Learnership Management System</span>
        <a class="logout">Logout</a>
      </section>
    </header>

    <main>
      <!-- structure of sidebar...only the user menu part works since theta the scope for now -->
       <!-- guys id not prefer this design pattern for the whole system because it will have thousands of lines of code and thats not very manageable -->
      <nav>
        <h2 onclick="toggle('mgmt')">Management <span>⌄</span></h2>

        <section id="mgmt" class="hidden">
          <a href="#" onclick="openUsers(event)">Users</a>
          <a href="#">Opportunities</a>
        </section>

        <h2 onclick="toggle('insights')">Insights <span>⌄</span></h2>

        <section id="insights" class="hidden">
          <a href="#">Reports</a>
        </section>

        <h2 onclick="toggle('system')">System <span>⌄</span></h2>

        <section id="system" class="hidden">
          <a href="#">Settings</a>
          <a href="#">Profile</a>
        </section>
      </nav>

      <!-- this is how i structured the user list -->
      <section id="userSection" class="hidden">
        <header>
          <h2>User Management</h2>
          <p>View and manage users</p>
        </header>

        <form onsubmit="return false">
          <input id="searchInput" type="text" placeholder="Search users..." />

          <select id="roleFilter">
            <option value="all">All Roles</option>
            <option value="applicant">Applicant</option>
            <option value="provider">Provider</option>
            <option value="admin">Admin</option>
          </select>
        </form>

        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
          </thead>

          <tbody id="userTableBody">
            <tr id="welcomeRow">
              <td colspan="3" class="welcomeCell">WELCOME</td>
            </tr>
          </tbody>
        </table>
      </section>

      <!--user details after clicking-->
      <section id="userDetailSection" class="hidden">
        <header>
            <!-- this header shows when i click user -->
          <h2>User Details</h2>
        </header>

        <article>
          <p>
            <!-- followed by names -->
            <strong>Name</strong>
            <span id="detailName"></span>
          </p>

          <p>
            <!-- followed by email then we have a drop down for the roles to be able to reassign -->
            <strong>Email</strong>
            <span id="detailEmail"></span>
          </p>

          <p>
            <!-- these are the role options for the user to be given by admin -->
            <strong>Role</strong>
            <select id="detailRole">
              <option value="applicant">Applicant</option>
              <option value="provider">Provider</option>
              <option value="admin">Admin</option>
            </select>
          </p>
            <!-- these buttons are the crud ones that appear together with user info when you click the user -->
          <footer>
            <button onclick="updateUser()">Save</button>
            <button onclick="deleteUser()">Delete</button>
            <button onclick="goBack()">Back</button>
          </footer>
        </article>
      </section>
    </main>

    <script>
      // toggle sidebar sections
      function toggle(id) {
        document.getElementById(id).classList.toggle("hidden");
      }
    </script>

    <script src="scripts/user-mng.js"></script>
  </body>
</html>

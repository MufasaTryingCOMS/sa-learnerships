<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Control Center</title>

<style>

/* ============================= */
/* BASIC PAGE SETUP */
/* ============================= */

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    color: #0f172a;
}

/* ============================= */
/* THEME VARIABLES */
/* ============================= */

:root {
    --primary-gradient: linear-gradient(135deg,#020b18,#0e264d,#15519b);
    --hover: rgba(255,255,255,0.07);
}

/* ============================= */
/* HEADER */
/* ============================= */

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 26px;
    background: var(--primary-gradient);
    color: white;
}

header h1 {
    margin: 0;
    font-size: 20px;
}

header section {
    display: flex;
    align-items: center;
    gap: 14px;
}

.logout {
    color: white;
    text-decoration: underline;
    cursor: pointer;
}

/* ============================= */
/* LAYOUT */
/* ============================= */

main {
    display: flex;
    height: calc(100vh - 72px);
}

/* ============================= */
/* SIDEBAR */
/* ============================= */

nav {
    width: 260px;
    background: var(--primary-gradient);
    padding-top: 8px;
}

nav h2 {
    margin: 6px 0 0;
    padding: 10px 16px;
    font-size: 13px;
    text-transform: uppercase;
    color: #cbd5e1;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
}

nav h2:hover {
    background: var(--hover);
}

nav section {
    display: flex;
    flex-direction: column;
}

nav a {
    color: white;
    text-decoration: none;
    padding: 9px 22px;
    font-size: 13px;
}

nav a:hover {
    background: var(--hover);
}

.hidden {
    display: none;
}

/* ============================= */
/* MAIN CONTENT */
/* ============================= */

main > section {
    flex: 1;
    padding: 28px;
    overflow-y: auto;
}

main > section > header {
    background: transparent;
    color: #0f172a;
    margin-bottom: 20px;
}

/* ============================= */
/* FORM */
/* ============================= */

form {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
}

input, select {
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    outline: none;
}

input {
    flex: 2;
}

select {
    flex: 1;
}

/* ============================= */
/* TABLE */
/* ============================= */

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
}

th, td {
    padding: 15px;
    border-bottom: 1px solid #eee;
}

th {
    background: #f8fafc;
    text-align: left;
}

td:nth-child(3),
th:nth-child(3) {
    text-align: center;
}

.badge {
    background: #e2e8f0;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
}

.empty {
    text-align: center;
    padding: 30px;
    color: #94a3b8;
}

/* ============================= */
/* USER DETAIL PAGE */
/* ============================= */

section article {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

section article p {
    margin: 10px 0;
}

section footer {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.save {
    background: #2563eb;
    color: white;
}

.delete {
    background: #dc2626;
    color: white;
}

.back {
    background: #94a3b8;
    color: white;
}

</style>
</head>

<body>

<header>
    <h1>Admin Control Center</h1>

    <section>
        <span>Learnership Management System</span>
        <a href="#" class="logout">Logout</a>
    </section>
</header>

<main>

<nav>

    <h2 onclick="toggle('mgmt')">Management <span>⌄</span></h2>

    <section id="mgmt" class="hidden">
        <a href="#" onclick="openUsers(event)">Users</a>
        <a href="#">Opportunities</a>
    </section>

    <h2 onclick="toggle('insights')">Insights <span>⌄</span></h2>

    <section id="insights" class="hidden">
        <a href="#">Reports</a>
    </section>

    <h2 onclick="toggle('system')">System <span>⌄</span></h2>

    <section id="system" class="hidden">
        <a href="#">Settings</a>
        <a href="#">Profile</a>
    </section>

</nav>

<section id="userSection" class="hidden">

<header>
    <h2>User Management</h2>
    <p>Manage users in the system.</p>
</header>

<form onsubmit="return false">

    <input id="searchInput" type="text" placeholder="Search users...">

    <select id="roleFilter">
        <option value="all">All Roles</option>
        <option value="applicant">Applicant</option>
        <option value="provider">Provider</option>
        <option value="admin">Admin</option>
    </select>

</form>

<table>
<thead>
<tr>
    <th>Full Name</th>
    <th>Email Address</th>
    <th>User Role</th>
</tr>
</thead>

<tbody id="userTableBody"></tbody>
</table>

</section>

<section id="userDetailSection" class="hidden">

<header>
    <h2>User Details</h2>
</header>

<article>

    <p><strong>Name:</strong> <span id="detailName"></span></p>
    <p><strong>Email:</strong> <span id="detailEmail"></span></p>

    <p><strong>Role:</strong></p>

    <select id="detailRole">
        <option value="applicant">Applicant</option>
        <option value="provider">Provider</option>
        <option value="admin">Admin</option>
    </select>

    <footer>
        <button type="button" class="save" onclick="updateUser()">Save</button>
        <button type="button" class="delete" onclick="deleteUser()">Delete</button>
        <button type="button" class="back" onclick="goBack()">Back</button>
    </footer>

</article>

</section>

</main>

<script>
function toggle(id) {
    document.getElementById(id).classList.toggle("hidden");
}
</script>

<script src="scripts/user-mng.js"></script>

</body>
</html>

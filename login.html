<!-- ====================== FILE INSTRUCTIONS =========================
    This is a login page 
    It's placed on the main project folder so that the url to it can be '/login.html' 
    It's styles can be found on the main scripts folder as other pages that are on the main project folder
-->
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login</title>
        <link rel="stylesheet" href="/styles/register.css" />
    </head>
    <body>
        <main class="wrapper">
            <article>
                <h1>Login</h1>
                <p class="description">Please fill in your details to access your account</p>
                <form id="login-form">
                    <section class="input-group">
                        <label for="email">Email</label>
                        <section class="input-wrapper">
                            <img src="../assets/email.svg" alt="email-icon" class="left-icon" />
                            <input type="email" id="email" name="email" placeholder="Enter your email address" />
                        </section>
                    </section>
                    <section class="input-group">
                        <label for="password">Password</label>
                        <section class="input-wrapper">
                            <img src="../assets/lock.svg" alt="lock-icon" class="left-icon" />
                            <input type="password" id="password" name="password" placeholder="Enter your password" />
                            <img src="../assets/eye-off.svg" alt="toggle-visibility" class="right-icon" />
                        </section>
                    </section>
                    <p id="error-message" class="error-message">Please enter the correct password.</p>
                    <section class="form-footer">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="remember-me" />
                            Remember me
                        </label>
                        <a href="../forgotPassword/forgot-password.html" class="forgot-password">Forgot Password</a>
                    </section>
                    <button type="submit" id="login-btn">Login</button>
                    <button type="button" id="google-btn">Login with Google</button>
                    <p class="bottom-message">
                        Do you have an account?
                        <a href="../register/register.html" class="register-link">Register</a>
                    </p>
                </form>
            </article>
        </main>
        <script type="module" src="/scripts/login.js"></script>
    </body>
</html>
